name: CDK Deploy

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

# ★ 全ステップで Node.js 24 を強制的に使用するように設定
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # ★ 24 に変更（現在の最新安定版）
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: CDK Deploy
        # vars.ENV_NAME は GitHub の Environment Variables (dev)
        run: npx cdk deploy --all -c env=${{ vars.ENV_NAME }} --require-approval never